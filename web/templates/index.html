<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDSSmarteArquiteto - Upload</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">EDS SmartArquiteto</h2>
        <form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label for="descricao" class="form-label">Descrição do Projeto</label>
                <input type="text" class="form-control" id="descricao" name="descricao" required>
            </div>
            <div class="mb-3">
                <label for="planta" class="form-label">Planta do Projeto (arquivo) <span class="text-secondary">(opcional)</span></label>
                <input class="form-control" type="file" id="planta" name="planta">
            </div>
            <button type="submit" class="btn btn-primary">Enviar e Iniciar Pipeline</button>
        </form>
    </div>
</body>
</html>
